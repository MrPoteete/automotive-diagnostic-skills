# Transmission Model Lookup
# Maps (make, model, year_range, optional engine_codes) → transmission_model
# Used to infer transmission family when VIN decode doesn't encode it directly.
#
# Match priority (highest to lowest):
#   1. make + model + year in [year_from, year_to] + engine_code prefix in engine_codes
#   2. make + model + year in [year_from, year_to] (no engine_code required)
#
# 'transmission_model' values must match transmission_codes in platform_families.yaml
# where applicable (e.g. "10L80" matches 10L80/10L90 family, "UA80E" matches UA80 family).
#
# Notes:
#   - make/model values must match NHTSA all-caps format (same as nhtsa_tsbs table)
#   - year_to is inclusive; omit year_to for "current production" entries
#   - engine_codes are RPO prefix codes as returned by NHTSA VIN decode "Engine Model"
#     field (first token before " - "). Omit the list to match all engines for that model/year.
#
# Source: Mined from 211K NHTSA TSBs + automotive domain knowledge (2026-04-20)

entries:

  # ---------------------------------------------------------------------------
  # GM Full-Size Trucks & SUVs — 6-Speed (6L80E)
  # Silverado/Sierra/Tahoe/Suburban/Yukon/Escalade, 2014-2018 with 5.3L or 6.2L
  # ---------------------------------------------------------------------------
  - make: CHEVROLET
    models: [SILVERADO 1500, TAHOE, SUBURBAN]
    year_from: 2014
    year_to: 2018
    engine_codes: [L83, L84, L82]   # 5.3L Gen V
    transmission_model: 6L80E

  - make: CHEVROLET
    models: [SILVERADO 1500, TAHOE, SUBURBAN, CAMARO, CORVETTE]
    year_from: 2014
    year_to: 2018
    engine_codes: [L87, LT1, LT2, L86]   # 6.2L Gen V
    transmission_model: 6L80E

  - make: GMC
    models: [SIERRA 1500, YUKON, YUKON XL]
    year_from: 2014
    year_to: 2018
    engine_codes: [L83, L84, L87]
    transmission_model: 6L80E

  - make: CADILLAC
    models: [ESCALADE, ESCALADE ESV]
    year_from: 2015
    year_to: 2018
    transmission_model: 6L80E

  # ---------------------------------------------------------------------------
  # GM Full-Size Trucks & SUVs — 8-Speed (8L90E)
  # 2019+ with 5.3L; 6.2L uses 10L80E (see below)
  # ---------------------------------------------------------------------------
  - make: CHEVROLET
    models: [SILVERADO 1500, TAHOE, SUBURBAN]
    year_from: 2019
    engine_codes: [L84, L8T, L83]   # 5.3L DFM and HD
    transmission_model: 8L90E

  - make: GMC
    models: [SIERRA 1500, YUKON, YUKON XL]
    year_from: 2019
    engine_codes: [L84, L8T]
    transmission_model: 8L90E

  - make: CADILLAC
    models: [ESCALADE, ESCALADE ESV]
    year_from: 2019
    engine_codes: [L84, L8T]
    transmission_model: 8L90E

  # 8L45 — Camaro/Corvette 6.2L LT1 (non-truck 8-speed)
  - make: CHEVROLET
    models: [CAMARO, CORVETTE]
    year_from: 2016
    engine_codes: [LT1, LT2, L86]
    transmission_model: 8L45

  # ---------------------------------------------------------------------------
  # GM Full-Size Trucks & SUVs — 10-Speed (10L80E/10L90E)
  # 6.2L L87 trucks and HD applications
  # ---------------------------------------------------------------------------
  - make: CHEVROLET
    models: [SILVERADO 1500, TAHOE, SUBURBAN, COLORADO]
