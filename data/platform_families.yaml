# Platform Family Definitions
#
# Maps powertrain engine/transmission families to the vehicles that use them.
# Used to expand TSB/complaint searches across platform siblings.
#
# component_types: NHTSA component categories where cross-platform generalization applies.
#   ENGINE and POWER TRAIN TSBs are platform-wide; BODY/HVAC/ELECTRICAL are NOT.
#
# engine_codes: GM/Ford/etc. RPO codes as returned in NHTSA VIN decode "Engine Model" field.
#   Match is done on the CODE PREFIX (first token before " - ").
#   Example: "L87 - DI, AFM, ALUM, GEN 5" → code = "L87"
#
# displacement_aliases: fallback text strings for manual entry (no VIN).
#   Matched case-insensitively against user-supplied engine description.
#
# members: list of {make, models, year_from, year_to (optional)} dicts.
#   make/models must match values in nhtsa_tsbs/complaints_fts exactly (all caps).

families:

  # ---------------------------------------------------------------------------
  # GM Gen V Small Block V8 — 6.2L
  # L87 (truck/SUV DFM), LT1 (Corvette C7), LT2 (Corvette C8), L86 (Camaro SS)
  # Known issues: AFM/DFM lifter collapse, timing chain, oil consumption
  # ---------------------------------------------------------------------------
  - family: GM Gen V 6.2L V8
    engine_codes: [L87, LT1, LT2, L86]
    displacement_aliases: ["6.2l", "6.2 l", "6.2 liter", "l87", "lt1", "lt2", "l86"]
    component_types:
      - ENGINE AND ENGINE COOLING
      - ENGINE
      - POWER TRAIN
      - LUBRICATION
    members:
      - make: CHEVROLET
        models: [SILVERADO 1500, TAHOE, SUBURBAN, CAMARO, CORVETTE]
        year_from: 2014
      - make: GMC
        models: [SIERRA 1500, YUKON, YUKON XL]
        year_from: 2014
      - make: CADILLAC
        models: [ESCALADE, ESCALADE ESV]
        year_from: 2015

  # ---------------------------------------------------------------------------
