[mypy]
explicit_package_bases = True
ignore_missing_imports = True
# database/ contains one-time import scripts — not part of core diagnostic engine
exclude = database/

# Legacy scraper/utility scripts — predate type-checking, not part of core diagnostic engine
[mypy-src.scrapers.*]
ignore_errors = True

[mypy-src.rag.*]
ignore_errors = True

# Root-level utility/scraper scripts (same — legacy, not core diagnostic engine)
[mypy-backfill_historical]
ignore_errors = True

[mypy-check_total_questions]
ignore_errors = True

[mypy-debug_processing]
ignore_errors = True

[mypy-deduplicate_data]
ignore_errors = True

[mypy-diagnose_api]
ignore_errors = True

[mypy-scrape_incremental]
ignore_errors = True

[mypy-run_scraper_simple]
ignore_errors = True
